<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokeWeb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HERO 100vh -->
    <section class="hero">

        <div class="backgrounds">
            <div class="bg home active" id="bg-home"></div>
            <div class="bg container" id="bg-sinnoh"></div>
            <div class="bg container2" id="bg-johto"></div>
            <div class="bg container3" id="bg-kanto"></div>
        </div>

        <div class="hero-content">
            <div class="header">
                <h1>Bienvenido a PokeWeb</h1>
                <p>Elige una region para empezar a buscar</p>
            </div>

            <nav>
                <ul>
                    <li><a href="#" data-region="home">Inicio</a></li>
                    <li><a href="#" data-region="kanto">Kanto</a></li>
                    <li><a href="#" data-region="johto">Johto</a></li>
                    <li><a href="#" data-region="sinnoh">Sinnoh</a></li>
                </ul>
            </nav>
        </div>

    </section>

    <!-- Mains -->
    <main class="home active"></main>

    <main class="sinnoh">
        <h2>Sinnoh</h2>
        <h1>Fidel ha hecho un</h1>
    </main>

    <main class="kanto">
        <h2>Kanto</h2>
    </main>

    <main class="johto">
        <h2>Johto</h2>
    </main>

    <script src="scriptsMain.js"></script>
</body>
</html>
