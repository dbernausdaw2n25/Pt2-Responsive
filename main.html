<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PokéWeb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HERO 100vh -->
    <section class="hero">

        <div class="backgrounds">
            <div class="bg home active" id="bg-home"></div>
            <div class="bg container" id="bg-sinnoh"></div>
            <div class="bg container2" id="bg-johto"></div>
            <div class="bg container3" id="bg-kanto"></div>
        </div>

        <div class="hero-content">
            <div class="header">
                <h1>Bienvenido a PokéWeb</h1>
                <p>Elige una región para empezar a buscar</p>
            </div>

            <nav>
                <ul>
                    <li><a href="#" data-region="home">Inicio</a></li>
                    <li><a href="#" data-region="kanto">Kanto</a></li>
                    <li><a href="#" data-region="johto">Johto</a></li>
                    <li><a href="#" data-region="sinnoh">Sinnoh</a></li>
                </ul>
            </nav>
        </div>

    </section>

    <!-- Mains -->
    <main class="home active"></main>

    <main class="sinnoh">
        <h2>Sinnoh</h2>
        <h1>Fidel ha hecho un</h1>
    </main>

    <main class="kanto">
        <h2>Kanto</h2>
        <h1>dani ha hecho un cambio</h1>
    </main>

    <main class="johto">
        <h2>Johto</h2>
        <!-- botón para abrir el mapa de Johto -->
        <a href="#" id="openMapaJohto" class="region-btn">Abrir mapa</a>


        <!-- Modal para mostrar el mapa -->
        <div id="mapModalJohto" class="modalJohto">
            <div class="modal-content-Johto">
                <span class="closeJohto" id="closeMapaJohto">&times;</span>
                <img src="img/mapaJohto.png" alt="Mapa de Johto">
                <div class="ciudadJohto1" onmouseenter="ciudadJohto1()"></div>
                <div class="ciudadJohto2" onmouseenter="ciudadJohto2()"></div>
                <div class="ciudadJohto3" onmouseenter="ciudadJohto3()"></div>
                <div class="ciudadJohto4" onmouseenter="ciudadJohto4()"></div>
                <div class="ciudadJohto5" onmouseenter="ciudadJohto5()"></div>
                <div class="ciudadJohto6" onmouseenter="ciudadJohto6()"></div>
                <div class="ciudadJohto7" onmouseenter="ciudadJohto7()"></div>
                <div class="ciudadJohto8" onmouseenter="ciudadJohto8()"></div>
                <div class="ciudadJohto9" onmouseenter="ciudadJohto9()"></div>
                <div class="ciudadJohto10" onmouseenter="ciudadJohto10()"></div>
                <div class="ciudadJohto11" onmouseenter="ciudadJohto11()"></div>
                <div class="ciudadJohto12" onmouseenter="ciudadJohto12()"></div>

            </div>
        </div>
    </main>

    <script src="scriptsMain.js"></script>
</body>

</html>
